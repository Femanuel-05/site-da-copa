<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa: Paixão pela Copa do Mundo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: #ffffff;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-top: 8px solid #8a1538; /* Cor inspirada na Copa */
        }

        h1 {
            color: #8a1538;
            margin-bottom: 10px;
            font-size: 24px;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            color: #333;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            border-color: #8a1538;
            outline: none;
            box-shadow: 0 0 5px rgba(138, 21, 56, 0.2);
        }

        .radio-group, .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
        }

        .radio-option, .checkbox-option {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: normal;
            cursor: pointer;
        }

        input[type="radio"], input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #8a1538;
        }

        button {
            background-color: #8a1538;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #5f0f26;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Pesquisa: Copa do Mundo</h1>
        <p class="subtitle">Queremos saber a sua opinião sobre o maior espetáculo da Terra!</p>

        <form action="#" method="POST">
            
            <!-- Campo de Texto Simples -->
            <div class="form-group">
                <label for="nome">Seu Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
            </div>

            <!-- Campo de Email -->
            <div class="form-group">
                <label for="email">Seu E-mail:</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            </div>

            <!-- Campo de Seleção (Dropdown) -->
            <div class="form-group">
                <label for="frequencia">Com que frequência você assiste aos jogos da Copa?</label>
                <select id="frequencia" name="frequencia" required>
                    <option value="" disabled selected>Selecione uma opção</option>
                    <option value="todos">Assisto a absolutamente todos os jogos</option>
                    <option value="maioria">Assisto à maioria dos jogos</option>
                    <option value="apenas-brasil">Assisto apenas aos jogos do Brasil</option>
                    <option value="finais">Assisto apenas à abertura e à final</option>
                </select>
            </div>

            <!-- Campo de Múltipla Escolha (Radio Buttons) -->
            <div class="form-group">
                <label>Para você, quem é o maior favorito a vencer a próxima Copa?</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="favorito" value="brasil" required> Brasil
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="favorito" value="franca"> França
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="favorito" value="argentina"> Argentina
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="favorito" value="outro"> Outra seleção / Surpresa
                    </label>
                </div>
            </div>

            <!-- Campo de Caixas de Seleção (Checkboxes) -->
            <div class="form-group">
                <label>Quais são suas coisas favoritas na Copa do Mundo? (Selecione todas que quiser)</label>
                <div class="checkbox-group">
                    <label class="checkbox-option">
                        <input type="checkbox" name="favoritos_copa" value="reunir-amigos"> Reunir os amigos e família
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="favoritos_copa" value="album-figurinhas"> Colecionar o álbum de figurinhas
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="favoritos_copa" value="ver-craques"> Ver os melhores jogadores do mundo em campo
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="favoritos_copa" value="cultura"> Conhecer a cultura do país sede
                    </label>
                </div>
            </div>

            <!-- Área de Texto Longo -->
            <div class="form-group">
                <label for="memoria">Qual é a sua memória mais marcante de uma Copa do Mundo?</label>
                <textarea id="memoria" name="memoria" rows="4" placeholder="Conte aqui aquele gol inesquecível ou momento emocionante..."></textarea>
            </div>

            <!-- Botão de Envio -->
            <button type="submit">Enviar Palpites</button>

        </form>
    </div>

</body>
</html>
